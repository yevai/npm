name: "Publish Packages"
on:
  pull_request:
    branches:
      - main
    types:
      - closed

# Using direction action commit hashes mitigates the rapidly exploding supply chain attacks.
jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: prod
    steps:
      - name: Git Checkout
        uses: actions/checkout@4f1f4aec02e41874fa0262ea8ff5172d7978ad1e # v7.0.0
        with:
          persist-credentials: true
          fetch-depth: 0
      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Setup Node
        uses: actions/setup-node@7c2c68d20d402ed6a201ada70a81341941093140 # v6.4.0
        with:
          node-version-file: "package.json"
          package-manager-cache: false
      - name: PNPM Install
        run: pnpm install --frozen-lockfile
      - name: Build Packages
        run: pnpm run build
      - name: Publish Packages
        run: pnpm changeset publish
        env:
          NPM_CONFIG_PROVENANCE: true
  docs:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: read
      id-token: write
      packages: read
      pages: write
    environment: github-pages
    steps:
      - name: Git Checkout
        uses: actions/checkout@4f1f4aec02e41874fa0262ea8ff5172d7978ad1e # v7.0.0
        with:
          persist-credentials: true
          fetch-depth: 0
      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Setup Node
        uses: actions/setup-node@7c2c68d20d402ed6a201ada70a81341941093140 # v6.4.0
        with:
          node-version-file: "package.json"
          package-manager-cache: false
      - name: PNPM Install
        run: pnpm install --frozen-lockfile
      - name: Build Packages # Not necessary for now but will be needed later
        run: pnpm run build
      - name: Generate Docs
        run: pnpm typedoc
      - name: Setup GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: "docs"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
